name: 'gh-mirror'
description: 'Mirror repositories from GitHub to GitVerse'
author: 'matveylapin'
branding:
  icon: 'git-branch'
  color: 'purple'

inputs:
  gitverse_token:
    description: 'GitVerse API token for creating and updating repositories'
    required: true

  github_token:
    description: >
      GitHub token for API access and repository cloning.
      A Personal Access Token (PAT) is required to sync all repositories.
      If not set, falls back to the GITHUB_TOKEN environment variable.
    required: false

  repos:
    description: >
      Comma-separated list of repositories in owner/repo format.
      If not set, all repositories belonging to the authenticated user are synced.
      Example: 'owner/repo1,owner/repo2'
    required: false

  source_owner:
    description: >
      GitHub organization or user that owns the source repositories.
      Required when mirroring repositories from an organization.
      Example: 'my-org'
    required: false

  gitverse_owner:
    description: >
      GitVerse organization or user where repositories will be created.
      Required when mirroring into an organization instead of a personal account.
      Example: 'my-org'
    required: false

  timeout_minutes:
    description: 'Sync timeout in minutes'
    required: false
    default: '30'

runs:
  using: 'docker'
  image: 'Dockerfile'
